name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    outputs:
      sha256: ${{ steps.sha.outputs.sha256 }}
      version: ${{ steps.version.outputs.version }}

    env:
      MIX_ENV: prod
      MIX_HOME: ${{ github.workspace }}/.mix
      HEX_HOME: ${{ github.workspace }}/.hex

    steps:
      - uses: actions/checkout@v4

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "27"

      - name: Install dependencies
        run: mix deps.get --only prod

      - name: Build escript
        run: mix escript.build

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256
        id: sha
        run: echo "sha256=$(sha256sum inkwell | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: inkwell
          body: |
            ## Install

            ### Homebrew
            ```bash
            brew tap zimakki/tap
            brew install inkwell
            ```

            ### Manual
            Download the `inkwell` binary below and place it in your `$PATH`.
            Requires Erlang/OTP runtime.

            **SHA256:** `${{ steps.sha.outputs.sha256 }}`

  update-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: build
    concurrency: homebrew-tap-update

    steps:
      - uses: actions/checkout@v4
        with:
          path: inkwell

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: zimakki/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          sed -e 's/__VERSION__/${{ needs.build.outputs.version }}/g' \
              -e 's/__SHA256__/${{ needs.build.outputs.sha256 }}/g' \
              inkwell/.github/formula-template.rb \
              > homebrew-tap/Formula/inkwell.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git diff --exit-code && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/inkwell.rb
          git commit -m "Update inkwell to ${{ needs.build.outputs.version }}"
          git push
