name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  tag:
    name: Create version tag
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    outputs:
      tag_created: ${{ steps.create_tag.outputs.created }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from VERSION file
        id: version
        run: |
          version=$(cat VERSION | tr -d '[:space:]')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: Create and push tag
        id: create_tag
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists, skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag "$tag"
            git push origin "$tag"
            echo "Created and pushed tag $tag"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: [tag]
    if: |
      always() &&
      (github.ref_type == 'tag' || needs.tag.outputs.tag_created == 'true')
    strategy:
      matrix:
        include:
          - os: macos-14
            target: darwin_arm64
          - os: macos-15-intel
            target: darwin_amd64
          - os: ubuntu-latest
            target: linux_amd64
    runs-on: ${{ matrix.os }}

    env:
      MIX_ENV: prod
      MIX_HOME: ${{ github.workspace }}/.mix
      HEX_HOME: ${{ github.workspace }}/.hex
      BURRITO_TARGET: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref || format('v{0}', needs.tag.outputs.version) }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "27.3.4.8"

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install xz (macOS)
        if: runner.os == 'macOS'
        run: brew install xz

      - name: Cache Mix deps
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.mix
            ${{ github.workspace }}/.hex
            deps
            _build
          key: cli-mix-${{ matrix.target }}-${{ hashFiles('mix.lock') }}
          restore-keys: cli-mix-${{ matrix.target }}-

      - name: Install dependencies
        run: mix deps.get --only prod

      - name: Build release
        run: mix release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: inkwell_${{ matrix.target }}
          path: burrito_out/inkwell_${{ matrix.target }}

  build-desktop:
    name: Build Desktop (${{ matrix.target }})
    needs: [tag]
    if: |
      always() &&
      (github.ref_type == 'tag' || needs.tag.outputs.tag_created == 'true')
    strategy:
      matrix:
        include:
          - os: macos-14
            target: darwin_arm64
          - os: macos-15-intel
            target: darwin_amd64
    runs-on: ${{ matrix.os }}

    env:
      MIX_ENV: prod
      MIX_HOME: ${{ github.workspace }}/.mix
      HEX_HOME: ${{ github.workspace }}/.hex
      BURRITO_TARGET: ${{ matrix.target }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref || format('v{0}', needs.tag.outputs.version) }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "27.3.4.8"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install xz
        run: brew install xz

      - name: Cache Cargo registry and Rust target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/cargo-tauri
            src-tauri/target
          key: desktop-cargo-${{ matrix.target }}-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: desktop-cargo-${{ matrix.target }}-

      - name: Install Tauri CLI
        run: |
          if ! command -v cargo-tauri &>/dev/null; then
            cargo install tauri-cli --version "^2.0"
          fi

      - name: Cache Mix deps
        uses: actions/cache@v5
        with:
          path: |
            ${{ github.workspace }}/.mix
            ${{ github.workspace }}/.hex
            deps
            _build
          key: desktop-mix-${{ matrix.target }}-${{ hashFiles('mix.lock') }}
          restore-keys: desktop-mix-${{ matrix.target }}-

      - name: Install dependencies
        run: mix deps.get --only prod

      - name: Build desktop app
        run: ./scripts/build-desktop.sh --release

      - name: Collect desktop artifacts
        run: |
          mkdir -p desktop_out
          dmg=$(find src-tauri/target/release/bundle/dmg -maxdepth 1 -name '*.dmg' | head -n 1)
          updater=$(find src-tauri/target/release/bundle/macos -maxdepth 1 -name '*.app.tar.gz' | head -n 1)
          sig="${updater}.sig"
          cp "$dmg" "desktop_out/Inkwell_${{ matrix.target }}.dmg"
          cp "$updater" "desktop_out/Inkwell_${{ matrix.target }}.app.tar.gz"
          cp "$sig" "desktop_out/Inkwell_${{ matrix.target }}.app.tar.gz.sig"

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: inkwell_desktop_${{ matrix.target }}
          path: desktop_out/*

  release:
    name: Create GitHub Release
    needs: [tag, build-cli, build-desktop]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256_darwin_arm64: ${{ steps.sha.outputs.sha256_darwin_arm64 }}
      sha256_darwin_amd64: ${{ steps.sha.outputs.sha256_darwin_amd64 }}
      sha256_linux_amd64: ${{ steps.sha.outputs.sha256_linux_amd64 }}
      sha256_darwin_arm64_dmg: ${{ steps.sha.outputs.sha256_darwin_arm64_dmg }}
      sha256_darwin_amd64_dmg: ${{ steps.sha.outputs.sha256_darwin_amd64_dmg }}

    steps:
      - uses: actions/download-artifact@v8

      - name: Extract version
        id: version
        run: |
          version="${{ needs.tag.outputs.version }}"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256s
        id: sha
        run: |
          for target in darwin_arm64 darwin_amd64 linux_amd64; do
            sha=$(sha256sum "inkwell_${target}/inkwell_${target}" | awk '{print $1}')
            echo "sha256_${target}=$sha" >> "$GITHUB_OUTPUT"
            echo "$target: $sha"
          done

          for target in darwin_arm64 darwin_amd64; do
            sha=$(sha256sum "inkwell_desktop_${target}/Inkwell_${target}.dmg" | awk '{print $1}')
            echo "sha256_${target}_dmg=$sha" >> "$GITHUB_OUTPUT"
            echo "${target}_dmg: $sha"
          done

      - name: Create checksums.txt
        run: |
          : > checksums.txt
          for target in darwin_arm64 darwin_amd64 linux_amd64; do
            (cd "inkwell_${target}" && sha256sum "inkwell_${target}") >> checksums.txt
          done

      - name: Generate latest.json
        run: |
          version="${{ steps.version.outputs.version }}"
          pub_date="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          arm_url="https://github.com/zimakki/inkwell/releases/download/v${version}/Inkwell_darwin_arm64.app.tar.gz"
          intel_url="https://github.com/zimakki/inkwell/releases/download/v${version}/Inkwell_darwin_amd64.app.tar.gz"
          arm_sig="$(tr -d '\n' < inkwell_desktop_darwin_arm64/Inkwell_darwin_arm64.app.tar.gz.sig)"
          intel_sig="$(tr -d '\n' < inkwell_desktop_darwin_amd64/Inkwell_darwin_amd64.app.tar.gz.sig)"

          jq -n \
            --arg version "$version" \
            --arg pub_date "$pub_date" \
            --arg arm_url "$arm_url" \
            --arg intel_url "$intel_url" \
            --arg arm_sig "$arm_sig" \
            --arg intel_sig "$intel_sig" \
            '{
              version: $version,
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": {
                  signature: $arm_sig,
                  url: $arm_url
                },
                "darwin-x86_64": {
                  signature: $intel_sig,
                  url: $intel_url
                }
              }
            }' > latest.json

      - name: Make binaries executable
        run: chmod +x inkwell_*/inkwell_*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            inkwell_*/inkwell_*
            inkwell_desktop_*/*.dmg
            inkwell_desktop_*/*.app.tar.gz
            inkwell_desktop_*/*.app.tar.gz.sig
            latest.json
            checksums.txt
          body: |
            ## Install

            ### Desktop App + CLI (macOS)
            ```bash
            brew tap zimakki/tap
            brew install --cask inkwell
            ```

            ### CLI only
            ```bash
            brew tap zimakki/tap
            brew install inkwell-cli
            ```

            ### Manual
            - Desktop app: download the macOS `.dmg` below.
            - CLI: download the binary for your platform below and place it in your `$PATH`.
            - No Erlang runtime required — it's bundled.

  update-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: [release]
    concurrency: homebrew-tap-update

    steps:
      - uses: actions/checkout@v6
        with:
          path: inkwell

      - name: Checkout homebrew-tap
        uses: actions/checkout@v6
        with:
          repository: zimakki/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          rm -f homebrew-tap/Formula/inkwell.rb
          sed -e 's/__VERSION__/${{ needs.release.outputs.version }}/g' \
              -e 's/__SHA256_DARWIN_ARM64__/${{ needs.release.outputs.sha256_darwin_arm64 }}/g' \
              -e 's/__SHA256_DARWIN_AMD64__/${{ needs.release.outputs.sha256_darwin_amd64 }}/g' \
              -e 's/__SHA256_LINUX_AMD64__/${{ needs.release.outputs.sha256_linux_amd64 }}/g' \
              inkwell/.github/formula-template.rb \
              > homebrew-tap/Formula/inkwell-cli.rb

      - name: Update cask
        run: |
          mkdir -p homebrew-tap/Casks
          sed -e 's/__VERSION__/${{ needs.release.outputs.version }}/g' \
              -e 's/__SHA256_DARWIN_ARM64_DMG__/${{ needs.release.outputs.sha256_darwin_arm64_dmg }}/g' \
              -e 's/__SHA256_DARWIN_AMD64_DMG__/${{ needs.release.outputs.sha256_darwin_amd64_dmg }}/g' \
              inkwell/.github/cask-template.rb \
              > homebrew-tap/Casks/inkwell.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git diff --exit-code && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/ Casks/inkwell.rb
          git commit -m "Update inkwell to ${{ needs.release.outputs.version }}"
          git push
