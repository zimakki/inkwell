name: Release

on:
  push:
    branches: [main]
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  tag:
    name: Create version tag
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    outputs:
      tag_created: ${{ steps.create_tag.outputs.created }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from mix.exs
        id: version
        run: |
          version=$(grep 'version:' mix.exs | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Detected version: $version"

      - name: Create and push tag
        id: create_tag
        run: |
          tag="v${{ steps.version.outputs.version }}"
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists, skipping"
            echo "created=false" >> "$GITHUB_OUTPUT"
          else
            git tag "$tag"
            git push origin "$tag"
            echo "Created and pushed tag $tag"
            echo "created=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build (${{ matrix.target }})
    needs: [tag]
    if: |
      always() &&
      (github.ref_type == 'tag' || needs.tag.outputs.tag_created == 'true')
    strategy:
      matrix:
        include:
          - os: macos-14
            target: darwin_arm64
          - os: macos-15
            target: darwin_amd64
          - os: ubuntu-latest
            target: linux_amd64
    runs-on: ${{ matrix.os }}

    env:
      MIX_ENV: prod
      MIX_HOME: ${{ github.workspace }}/.mix
      HEX_HOME: ${{ github.workspace }}/.hex
      BURRITO_TARGET: ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_type == 'tag' && github.ref || format('v{0}', needs.tag.outputs.version) }}

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          elixir-version: "1.19"
          otp-version: "27.3.4.8"

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install xz (macOS)
        if: runner.os == 'macOS'
        run: brew install xz

      - name: Install dependencies
        run: mix deps.get --only prod

      - name: Build release
        run: mix release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: inkwell_${{ matrix.target }}
          path: burrito_out/inkwell_${{ matrix.target }}

  release:
    name: Create GitHub Release
    needs: [tag, build]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      sha256_darwin_arm64: ${{ steps.sha.outputs.sha256_darwin_arm64 }}
      sha256_darwin_amd64: ${{ steps.sha.outputs.sha256_darwin_amd64 }}
      sha256_linux_amd64: ${{ steps.sha.outputs.sha256_linux_amd64 }}

    steps:
      - uses: actions/download-artifact@v4

      - name: Extract version
        id: version
        run: |
          version="${{ needs.tag.outputs.version }}"
          if [ -z "$version" ]; then
            version="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Compute SHA256s
        id: sha
        run: |
          for target in darwin_arm64 darwin_amd64 linux_amd64; do
            sha=$(sha256sum "inkwell_${target}/inkwell_${target}" | awk '{print $1}')
            echo "sha256_${target}=$sha" >> "$GITHUB_OUTPUT"
            echo "$target: $sha"
          done

      - name: Make binaries executable
        run: chmod +x inkwell_*/inkwell_*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: inkwell_*/inkwell_*
          body: |
            ## Install

            ### Homebrew
            ```bash
            brew tap zimakki/tap
            brew install inkwell
            ```

            ### Manual
            Download the binary for your platform below and place it in your `$PATH`.
            No Erlang runtime required — it's bundled.

  update-tap:
    name: Update Homebrew Tap
    runs-on: ubuntu-latest
    needs: [release]
    concurrency: homebrew-tap-update

    steps:
      - uses: actions/checkout@v4
        with:
          path: inkwell

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: zimakki/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          sed -e 's/__VERSION__/${{ needs.release.outputs.version }}/g' \
              -e 's/__SHA256_DARWIN_ARM64__/${{ needs.release.outputs.sha256_darwin_arm64 }}/g' \
              -e 's/__SHA256_DARWIN_AMD64__/${{ needs.release.outputs.sha256_darwin_amd64 }}/g' \
              -e 's/__SHA256_LINUX_AMD64__/${{ needs.release.outputs.sha256_linux_amd64 }}/g' \
              inkwell/.github/formula-template.rb \
              > homebrew-tap/Formula/inkwell.rb

      - name: Commit and push
        working-directory: homebrew-tap
        run: |
          git diff --exit-code && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/inkwell.rb
          git commit -m "Update inkwell to ${{ needs.release.outputs.version }}"
          git push
